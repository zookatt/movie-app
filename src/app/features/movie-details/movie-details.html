<section
  class="flex min-h-screen items-center justify-center bg-black px-6 py-10 text-white"
>
    <article
      class="grid w-full max-w-5xl overflow-hidden rounded-lg bg-zinc-900 shadow-lg md:grid-cols-2"
    >
      <div class="flex min-h-64 items-start bg-red-700 p-6">
        <span class="rounded bg-black px-3 py-1 text-sm font-semibold">
          Top pick
        </span>
      </div>

      <div class="flex flex-col justify-center p-8">
       
        <h1 class="mb-4 text-4xl font-bold">{{ movie()?.title }}</h1>
       
        <p class="mb-6 text-gray-300">
          Una ficha sencilla para mostrar la pelicula seleccionada.
        </p>

        <button
          class="w-fit rounded bg-red-600 px-5 py-3 font-semibold text-white hover:bg-red-700"
          type="button"
          (click)="goBack()"
        >
          Volver al listado
        </button>
      </div>
    </article>
  
</section>
