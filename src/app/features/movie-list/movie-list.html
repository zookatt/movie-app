<ul class="container mx-auto grid grid-cols-3 gap-1.5 p-5">
  @for (movie of movies; track movie.id) {
    <li class="flex flex-col items-center">
      <a [routerLink]="['/movies', 'movie.id']">{{ movie.title }}</a>
      <p>{{ movie.id }}</p>
      <p>{{ movie.genre }}</p>
      <p>{{ movie.director }}</p>
    </li>
  }
</ul>
