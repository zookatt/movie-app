<section class="min-h-screen bg-black px-6 py-10 text-white">
  <div class="mx-auto mb-8 max-w-6xl">
    <h1 class="mb-3 text-4xl font-bold">Catalogo de peliculas</h1>
  </div>

  <ul class="mx-auto grid max-w-6xl gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (movie of movies(); track movie.id) {
      <li class="rounded-lg bg-zinc-900 p-5 shadow-md">
        <a
          class="mb-2 block text-2xl font-bold text-white hover:text-red-400"
          [routerLink]="['/movies', movie.id]"
        >
          {{ movie.title }}
        </a>
        <img
          class="mb-4 mx-auto h-100 w-auto rounded-md object-cover object-center"
          [src]="movie.poster_path"
          alt=" {{ movie.title }}"
        />
        <p class="mb-2 text-sm font-semibold uppercase text-red-500">#{{ movie.id }}</p>

        <p class="mb-2 text-sm font-semibold uppercase text-white">
          {{ movie.overview }}
        </p>
      </li>
    }
  </ul>
</section>
